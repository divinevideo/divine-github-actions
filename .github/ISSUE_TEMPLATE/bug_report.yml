name: Bug Report
description: Report a bug or regression in a reusable action
title: "fix: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Use generic descriptors instead of partner, customer, or brand names in public issue titles, bodies, and screenshots unless a maintainer explicitly approves naming them.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the bug and the impacted action or workflow behavior.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Run workflow ...
        2. Use action input ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional Context
      description: Include logs or snippets with sensitive names redacted.
